- type: entity
  id: IAmAtomicOrb
  name: Atomic Sphere
  description: "A sphere pulsing with immense destructive energy. Those who wield it speak words of annihilation."
  parent: BaseItem
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: Objects/Magic/magicactions.rsi
    layers:
    - state: act_nuke
      shader: unshaded
  - type: PointLight
    color: "#9900FF"
    radius: 3.0
    energy: 6.0
    castShadows: false
  - type: LightBehaviour
    behaviours:
    - !type:FadeBehaviour
      interpolate: Nearest
      minDuration: 0.4
      maxDuration: 0.6
      startValue: 3.0
      endValue: 8.0
      property: Energy
      enabled: true
      isLooped: true
      reverseWhenFinished: true
  - type: IAmAtomic
    castTime: 44.0
    explosionRadius: 20.0
    explosionIntensity: 500.0
    explosionMaxTileBreak: 10
  - type: Trail
    frequency: 0.03
    lifetime: 0.5
    alphaLerpAmount: 0.18
    alphaLerpTarget: 0.0
    scaleLerpAmount: 0.12
    scaleLerpTarget: 0.0
    lerpTime: 0.025
    color: "#AA00FFDD"
    scale: 0.18