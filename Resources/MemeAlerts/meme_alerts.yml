# Конфигурация MemeAlerts для SS14
# Вызов: admemealert <ключ>
#
# Поля:
#   message        — текст объявления
#   sender         — заголовок (вместо "Центральное командование")
#   color          — цвет текста (hex)
#   announce_sound — звук при появлении
#   during_sound   — звук сразу после (null = выключено)

alerts:
  test:
    message: "Тестовое оповещение! Просто проверка."
    sender: "Системное сообщение"
    color: "#3399ff"
    announce_sound: "/Audio/Announcements/announce.ogg"
    during_sound: null

  nuclear:
    message: "ЯДЕРНОЕ УСТРОЙСТВО АКТИВИРОВАНО! У вас есть 5 минут до детонации."
    sender: "Служба безопасности"
    color: "#ff2200"
    announce_sound: "/Audio/Announcements/war.ogg"
    during_sound: "/Audio/Effects/siren.ogg"

  party:
    message: "ВЕЧЕРИНКА НА СТАНЦИИ! Капитан объявляет свободное время. Все в бар!"
    sender: "Капитан"
    color: "#ffdd00"
    announce_sound: "/Audio/Items/airhorn.ogg"
    during_sound: null

  clown_takeover:
    message: "ХА-ХА-ХА! Клоун захватил командный мостик. Мы обречены."
    sender: "Клоун"
    color: "#cc44ff"
    announce_sound: "/Audio/Items/bikehorn.ogg"
    during_sound: null

  asivoy:
    message: "Авито Доставка! Жалоба от курьера! Пицца 4 сына доставка... ВЫ почему трубку не берёте Э!? Гандон конченный.. Пиццу принёсс пападьезд.. ТЫ чё бля молчишь э.. СУЧКа бля э. А!!?? Пицца 4 ССына Хуйня.. Э спустить забери какого хуя своем матизе. Э я пока ехал мащина матиз  брбррбб бпжэпэ... ВСЁ слоомался ебал твой рот!"
    sender: "Курьер"
    color: "#FFFFFF"
    announce_sound: "/Audio/Memealert/infozakaz.ogg"
    during_sound: "/Audio/Memealert/pizza4.ogg"

  blackmesaalert:
    message: "Внимание, эта система объявлений теперь находится под военным командованием."
    sender: "HECU Marines intercom announcement"
    color: "#6B8E23"
    announce_sound: "/Audio/Memealert/overhead_login00.ogg"
    during_sound: "/Audio/Memealert/switchover.ogg"

  blackmesaalert2:
    message: "Внимание! Весь персонал обязан немедленно прекратить работу и ожидать дальнейших инструкций в жилых секторах. Сопротивление будет подавлено."
    sender: "HECU Marines intercom announcement"
    color: "#6B8E23"
    announce_sound: "/Audio/Memealert/beep01.ogg"
    during_sound: null
